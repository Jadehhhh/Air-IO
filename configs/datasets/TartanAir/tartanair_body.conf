# Configuration for TartanAir V2 dataset (body-frame, with gravity retained)
#
# Directory layout expected under data_root:
#   <data_root>/
#     <ENV>/<LEVEL>/<TRAJ>/
#       imu/imu.npy     # [timestamp_ns, wx, wy, wz, ax, ay, az] @ ~100 Hz
#       pose.txt        # one line per image frame: "tx ty tz qx qy qz qw" (NED frame)
#
# Replace the example data_drive entries with your own downloaded trajectories.

train:
{
    mode: train
    coordinate: body_coord
    data_list:
    [
        {
            name: TartanAir
            window_size: 1000
            step_size: 3
            data_root: TartanAir_dataset
            data_drive: [
                abandonedfactory/Easy/P000,
                abandonedfactory/Easy/P001,
                abandonedfactory/Hard/P000,
                hospital/Easy/P000,
                hospital/Easy/P001,
            ]
        },
    ]
    gravity: 9.81007
}

test:
{
    mode: test
    coordinate: body_coord
    data_list:
    [
        {
            name: TartanAir
            window_size: 1000
            step_size: 10
            data_root: TartanAir_dataset
            data_drive: [
                abandonedfactory/Easy/P002,
                hospital/Easy/P002,
            ]
        },
    ]
    gravity: 9.81007
}

eval:
{
    mode: evaluate
    coordinate: body_coord
    data_list:
    [
        {
            name: TartanAir
            window_size: 1000
            step_size: 200
            data_root: TartanAir_dataset
            data_drive: [
                abandonedfactory/Easy/P002,
                hospital/Easy/P002,
            ]
        },
    ]
    gravity: 9.81007
}

inference:
{
    mode: infevaluate
    coordinate: body_coord
    rot_type: None
    rot_path: PATH_TO_AIRIMU_NETOUTPUT
    data_list:
    [
        {
            name: TartanAir
            window_size: 1000
            step_size: 1000
            data_root: TartanAir_dataset
            data_drive: [
                abandonedfactory/Easy/P002,
                hospital/Easy/P002,
            ]
        },
    ]
    gravity: 9.81007
}
